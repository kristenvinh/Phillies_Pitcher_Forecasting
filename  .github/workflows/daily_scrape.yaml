name: Daily Statcast Ingestion Pipeline

on:
  schedule:
    # Runs everyday at 10:00 AM UTC (6:00 AM Eastern Time)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to trigger the job manually from the GitHub UI

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Authenticate directly to Google Cloud using GitHub Secrets
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build Docker Image
      run: |
        docker build -t phillies-statcast-scraper .

    # Run the container exactly like you did on your Mac Studio, 
    # but pulling the credentials dynamically from the automated runner environment
    - name: Execute Daily Scrape & Load
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        docker run --rm \
          -e GCP_PROJECT_ID="$GCP_PROJECT_ID" \
          -e GOOGLE_APPLICATION_CREDENTIALS="/app/secrets/google_creds.json" \
          -v $GOOGLE_APPLICATION_CREDENTIALS:/app/secrets/google_creds.json \
          phillies-statcast-scraper