name: Daily Statcast Ingestion Pipeline

on:
  schedule:
    # Runs everyday at 10:00 AM UTC (6:00 AM Eastern Time)
    - cron: '0 10 * * *'
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build Docker Image
      run: |
        docker build -t phillies-statcast-scraper .

    - name: Execute Daily Scrape & Load
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        docker run --rm \
          -e GCP_PROJECT_ID="$GCP_PROJECT_ID" \
          -e GOOGLE_APPLICATION_CREDENTIALS="/app/secrets/google_creds.json" \
          -v $GOOGLE_APPLICATION_CREDENTIALS:/app/secrets/google_creds.json \
          phillies-statcast-scraper

    - name: Sync Features to Google Sheets
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: |
        docker run --rm \
          -e GCP_PROJECT_ID="$GCP_PROJECT_ID" \
          -e GOOGLE_SHEET_ID="$GOOGLE_SHEET_ID" \
          -e GOOGLE_APPLICATION_CREDENTIALS="/app/secrets/google_creds.json" \
          -v $GOOGLE_APPLICATION_CREDENTIALS:/app/secrets/google_creds.json \
          phillies-statcast-scraper \
          python sync_to_sheets.py